<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Webhook Link Generator</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #16161f;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 550px;
            border: 1px solid #232335;
        }
        h2 {
            text-align: center;
            color: #00ffa6;
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p.subtitle {
            text-align: center;
            color: #88889b;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #b4b4c7;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #2d2d3f;
            border-radius: 8px;
            background-color: #1e1e2a;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #00ffa6;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #00ffa6;
            color: #0f0f12;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #00d489;
            box-shadow: 0 0 15px rgba(0, 255, 166, 0.4);
        }
        .result-box {
            margin-top: 30px;
            display: none;
            background-color: #1e1e2a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #00ffa6;
        }
        .copy-container {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        textarea {
            width: 100%;
            height: 70px;
            background-color: #12121a;
            color: #00ffa6;
            border: 1px solid #2d2d3f;
            border-radius: 6px;
            padding: 10px;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }
        .copy-btn {
            width: auto;
            padding: 0 20px;
            background-color: #2d2d3f;
            color: #fff;
            font-size: 14px;
        }
        .copy-btn:hover {
            background-color: #3e3e56;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Roblox Loadstring Link Generator</h2>
    <p class="subtitle">Webhook adresini yaz ve anında hazır çeken loadstring linkini al.</p>
    
    <label for="webhookUrl">Discord Webhook URL:</label>
    <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
    
    <button onclick="generateLink()">Loadstring Linki Oluştur</button>
    
    <div class="result-box" id="resultBox">
        <label for="outputCode">Oluşturulan Script Linki (Kopyala ve Executor'da Çalıştır):</label>
        <div class="copy-container">
            <textarea id="outputCode" readonly></textarea>
        </div>
        <button class="copy-btn" style="width: 100%; margin-top: 10px; background-color: #00ffa6; color: #0f0f12;" onclick="copyToClipboard()">Kodu Kopyala</button>
    </div>
</div>

<script>
// Sayfa bir yükleyici (loader) olarak tetiklendiyse doğrudan Lua kodunu basacak backend simülasyonu
window.onload = function() {
    const hash = window.location.hash;
    if (hash && hash.length > 10) {
        // Eğer linkin sonunda bir webhook varsa doğrudan Lua scriptini text olarak ekrana yazdırır
        document.body.innerHTML = "";
        document.body.style.backgroundColor = "#121212";
        document.body.style.color = "#ffffff";
        document.body.style.display = "block";
        document.body.style.padding = "20px";
        document.body.style.fontFamily = "monospace";
        document.body.style.whiteSpace = "pre";
        
        let decodedWebhook = "";
        try {
            decodedWebhook = atob(hash.substring(1));
        } catch(e) {
            document.body.innerText = "-- Gecersiz link veya bozuk webhook.";
            return;
        }

        const luaMainCode = `-- Roblox Log Script
local webhook = "${decodedWebhook}"
local Players = game:GetService("Players")
local Market = game:GetService("MarketplaceService")
local HttpService = game:GetService("HttpService")

local player = Players.LocalPlayer
local userId = player.UserId
local username = player.Name
local displayName = player.DisplayName
local profileUrl = "https://www.roblox.com/users/" .. userId .. "/profile"

-- Oyundaki toplam kişi sayısı
local playerInServer = #Players:GetPlayers()

-- Hesap Yaşı Hesaplama (Gün)
local accountAge = player.AccountAge

-- Oyun adı çekme
local gameName = "Bilinmiyor (Studio olabilir)"
pcall(function()
    gameName = Market:GetProductInfo(game.PlaceId).Name
end)

-- Executor tespiti
local executor = identifyexecutor and identifyexecutor() or "Bilinmeyen Executor"
local timestamp = os.date("!%Y-%m-%dT%H:%M:%SZ")

local data = {
    ["embeds"] = {{
        ["title"] = "🚀 Script Tetiklendi!",
        ["color"] = 16711710, -- Canlı Pembe/Kırmızı tonu
        ["fields"] = {
            {["name"] = "Kullanıcı Adı (Username)", ["value"] = username, ["inline"] = true},
            {["name"] = "Görünen Ad (Display Name)", ["value"] = displayName, ["inline"] = true},
            {["name"] = "User ID", ["value"] = tostring(userId), ["inline"] = true},
            {["name"] = "Hesap Yaşı", ["value"] = tostring(accountAge) .. " Günlük", ["inline"] = true},
            {["name"] = "Sunucudaki Kişi Sayısı", ["value"] = tostring(playerInServer) .. " Oyuncu", ["inline"] = true},
            {["name"] = "Executor", ["value"] = executor, ["inline"] = true},
            {["name"] = "Oynadığı Oyun", ["value"] = gameName, ["inline"] = false},
            {["name"] = "Profil Linki", ["value"] = "[Profiline Git](" .. profileUrl .. ")", ["inline"] = false}
        },
        ["footer"] = {["text"] = "Sistem Aktif"},
        ["timestamp"] = timestamp
    }}
}

local headers = {["Content-Type"] = "application/json"}
local request = http_request or request or syn and syn.request or http and http.request

if request then
    request({
        Url = webhook,
        Method = "POST",
        Headers = headers,
        Body = HttpService:JSONEncode(data)
    })
else
    -- Fallback btools/print if execution method not standard
    print("Http istek yetkisi yok.")
end`;

        document.innerText = luaMainCode;
        document.body.textContent = luaMainCode;
    }
}

function generateLink() {
    const webhookInput = document.getElementById('webhookUrl').value.trim();
    
    if(!webhookInput.includes('discord.com/api/webhooks/')) {
        alert('Lütfen geçerli bir Discord Webhook URL girin!');
        return;
    }

    // Webhook'u güvenli hale getirmek için Base64'e çeviriyoruz
    const encoded = btoa(webhookInput);
    
    // Şu an bulunulan sitenin güncel linkini alır (GitHub sayfa linkin neyse otomatik ona uyarlanır)
    const currentUrl = window.location.href.split('#')[0];
    const finalDataUrl = currentUrl + "#" + encoded;
    
    // Executor'a yapıştırılacak kusursuz loadstring komutu
    const finalLoadstring = `loadstring(game:HttpGet("${finalDataUrl}"))()`;
    
    document.getElementById('outputCode').value = finalLoadstring;
    document.getElementById('resultBox').style.display = 'block';
}

function copyToClipboard() {
    const copyText = document.getElementById("outputCode");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value);
    alert("Loadstring linki başarıyla kopyalandı! Doğrudan executor'a yapıştırabilirsin.");
}
</script>

</body>
</html>
